<ion-header>
  <ion-toolbar>
    <ion-title> Dose App</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <!-- Hero Section -->
  <div class="hero-section">
    <div class="hero-glow"></div>
    <div class="hero-icon">🍸</div>
    <h1 class="hero-title">Bem-vindo ao<br><span class="text-gold">Dose!</span></h1>
    <p class="hero-subtitle">
      Descubra receitas de drinks do mundo inteiro e surpreenda seus convidados.
    </p>
  </div>

  <!-- Cards de destaque -->
  <div class="section-padding">

    <div class="feature-cards">
      <div class="feature-card">
        <span class="feature-icon">🔍</span>
        <p class="feature-label">Busque por nome</p>
      </div>
      <div class="feature-card">
        <span class="feature-icon">📋</span>
        <p class="feature-label">Veja ingredientes</p>
      </div>
      <div class="feature-card">
        <span class="feature-icon">🌍</span>
        <p class="feature-label">Drinks do mundo</p>
      </div>
    </div>

    <div class="drinks-divider"></div>

    <p class="hint-text">
      Digite o nome de um drink na próxima tela para ver sua receita completa.
    </p>

    <ion-button expand="block" routerLink="/detalhes" class="cta-button">
      Buscar Drinks
    </ion-button>

  </div>

</ion-content>
